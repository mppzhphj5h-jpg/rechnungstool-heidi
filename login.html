<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a365d">
  <title>Anmelden – Provisionsabrechnung</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; padding: 24px 16px; }

    .auth-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(26,54,93,0.10);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-logo h1 {
      font-size: 1.5rem;
      color: var(--primary);
      font-weight: 700;
    }

    .auth-logo p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .auth-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      padding: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .auth-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .auth-panel { display: none; }
    .auth-panel.active { display: flex; flex-direction: column; gap: 16px; }

    .auth-error {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid #feb2b2;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.875rem;
      display: none;
    }

    .auth-error.visible { display: block; }

    .auth-success {
      background: #f0fff4;
      color: var(--success);
      border: 1px solid #9ae6b4;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.875rem;
      display: none;
    }

    .auth-success.visible { display: block; }

    .password-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: -8px;
    }

    .input-wrap { position: relative; }

    .input-wrap input { width: 100%; padding-right: 48px; }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      padding: 4px;
      line-height: 1;
    }

    .forgot-link {
      background: none;
      border: none;
      color: var(--primary-light);
      font-size: 0.875rem;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-align: right;
      align-self: flex-end;
    }

    .forgot-link:hover { color: var(--primary); }

    .btn-auth {
      width: 100%;
      flex: none;
    }

    .reset-back {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.875rem;
      cursor: pointer;
      padding: 0;
      text-align: center;
      margin-top: 4px;
    }

    .reset-back:hover { color: var(--primary); }

    #resetPanel { display: none; flex-direction: column; gap: 16px; }
    #resetPanel.active { display: flex; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Provisionen</h1>
    </div>

    <!-- Login / Register Tabs -->
    <div class="auth-tabs" id="authTabs">
      <button class="auth-tab active" data-panel="loginPanel">Anmelden</button>
      <button class="auth-tab" data-panel="registerPanel">Registrieren</button>
    </div>

    <!-- Login -->
    <div class="auth-panel active" id="loginPanel">
      <div class="auth-error" id="loginError"></div>
      <div class="form-group">
        <label for="loginEmail">E-Mail</label>
        <input type="email" id="loginEmail" autocomplete="email" inputmode="email" placeholder="name@beispiel.de">
      </div>
      <div class="form-group">
        <label for="loginPw">Passwort</label>
        <div class="input-wrap">
          <input type="password" id="loginPw" autocomplete="current-password" placeholder="Passwort">
          <button type="button" class="toggle-pw" data-target="loginPw" aria-label="Passwort anzeigen">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-auth" id="btnLogin">Anmelden</button>
      <button class="forgot-link" id="btnForgot">Passwort vergessen?</button>
    </div>

    <!-- Register -->
    <div class="auth-panel" id="registerPanel">
      <div class="auth-error" id="registerError"></div>
      <div class="auth-success" id="registerSuccess"></div>
      <div class="form-group">
        <label for="regEmail">E-Mail</label>
        <input type="email" id="regEmail" autocomplete="email" inputmode="email" placeholder="name@beispiel.de">
      </div>
      <div class="form-group">
        <label for="regPw">Passwort</label>
        <div class="input-wrap">
          <input type="password" id="regPw" autocomplete="new-password" placeholder="Mindestens 8 Zeichen">
          <button type="button" class="toggle-pw" data-target="regPw" aria-label="Passwort anzeigen">👁</button>
        </div>
        <p class="password-hint">Mindestens 8 Zeichen, Buchstaben und Zahlen empfohlen.</p>
      </div>
      <div class="form-group">
        <label for="regPw2">Passwort bestätigen</label>
        <div class="input-wrap">
          <input type="password" id="regPw2" autocomplete="new-password" placeholder="Passwort wiederholen">
          <button type="button" class="toggle-pw" data-target="regPw2" aria-label="Passwort anzeigen">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-auth" id="btnRegister">Konto erstellen</button>
    </div>

    <!-- Password Reset (kein eigenes Tab, erscheint bei "Passwort vergessen") -->
    <div id="resetPanel">
      <div class="auth-error" id="resetError"></div>
      <div class="auth-success" id="resetSuccess"></div>
      <div class="form-group">
        <label for="resetEmail">E-Mail-Adresse</label>
        <input type="email" id="resetEmail" inputmode="email" placeholder="name@beispiel.de">
      </div>
      <button class="btn btn-primary btn-auth" id="btnReset">Link zum Zurücksetzen senden</button>
      <button class="reset-back" id="btnResetBack">← Zurück zum Anmelden</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
  'use strict';

  // Konfiguration prüfen
  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#c53030;max-width:500px;margin:auto">' +
      '<h2>Konfiguration fehlt</h2>' +
      '<p style="margin-top:12px">Bitte trage in <code>config.js</code> deine Supabase-URL und den Anon-Key ein.<br>' +
      'Anleitung: <strong>README.md → Authentifizierung einrichten</strong></p></div>';
    throw new Error('Supabase config missing');
  }

  const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Wenn bereits eingeloggt → direkt weiter
  _sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.replace('index.html');
  });

  // ── Hilfsfunktionen ──
  function showError(el, msg) {
    el.textContent = msg;
    el.classList.add('visible');
  }
  function clearMsg(el) { el.classList.remove('visible'); el.textContent = ''; }
  function showSuccess(el, msg) { el.textContent = msg; el.classList.add('visible'); }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.dataset.orig = btn.dataset.orig || btn.textContent;
    btn.textContent = loading ? 'Bitte warten…' : btn.dataset.orig;
  }

  // Übersetzt Supabase-Auth-Fehler in deutsche, verständliche Meldungen.
  // Matcht primär über error.code (Supabase-JS v2), mit Fallback auf error.message.
  // Unbekannte Fehler werden im Klartext angezeigt, damit die Ursache nicht verschluckt wird.
  function translateAuthError(error, context) {
    if (!error) return 'Unbekannter Fehler.';
    // Diagnose-Hilfe in DevTools
    try { console.error('[Auth ' + context + ']', error); } catch(_) {}

    const code = (error.code || '').toString();
    const msg  = (error.message || '').toString();
    const status = error.status;

    // Netzwerk / Verbindung (z.B. fetch failed, kein Internet)
    if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || error.name === 'TypeError') {
      return 'Keine Verbindung zum Server. Bitte Internetverbindung prüfen und erneut versuchen.';
    }

    // Bekannte Supabase-Codes
    switch (code) {
      case 'invalid_credentials':
        return 'E-Mail oder Passwort ist falsch.';
      case 'email_not_confirmed':
        return 'Bitte bestätige zuerst deine E-Mail-Adresse (Link in deinem Postfach).';
      case 'user_not_found':
        return 'Es existiert kein Konto mit dieser E-Mail-Adresse.';
      case 'user_already_exists':
      case 'email_exists':
        return 'Diese E-Mail-Adresse ist bereits registriert.';
      case 'weak_password':
        return 'Passwort ist zu schwach. Bitte mindestens 8 Zeichen mit Buchstaben und Zahlen wählen.';
      case 'over_request_rate_limit':
      case 'over_email_send_rate_limit':
        return 'Zu viele Versuche. Bitte ein paar Minuten warten und erneut versuchen.';
      case 'validation_failed':
        return 'Eingabe ungültig: ' + (msg || 'Bitte E-Mail-Format prüfen.');
      case 'signup_disabled':
        return 'Registrierung ist derzeit deaktiviert.';
    }

    // Fallback über Message-Text (alte SDK-Versionen)
    if (msg.includes('Invalid login credentials')) return 'E-Mail oder Passwort ist falsch.';
    if (msg.includes('Email not confirmed'))      return 'Bitte bestätige zuerst deine E-Mail-Adresse (Link in deinem Postfach).';
    if (msg.includes('already registered'))       return 'Diese E-Mail-Adresse ist bereits registriert.';
    if (msg.toLowerCase().includes('rate limit')) return 'Zu viele Versuche. Bitte kurz warten und erneut versuchen.';

    // Unbekannt: echte Server-Meldung anzeigen, damit der Fehler nicht verschluckt wird
    const detail = msg || ('HTTP ' + (status || '?'));
    return 'Anmeldung fehlgeschlagen: ' + detail;
  }

  // ── Tabs ──
  const tabs = document.querySelectorAll('.auth-tab');
  const panels = document.querySelectorAll('.auth-panel');
  const resetPanel = document.getElementById('resetPanel');

  document.getElementById('authTabs').addEventListener('click', e => {
    const tab = e.target.closest('.auth-tab');
    if (!tab) return;
    tabs.forEach(t => t.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    resetPanel.classList.remove('active');
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
    document.getElementById('authTabs').style.display = '';
  });

  // ── Passwort anzeigen/verbergen ──
  document.querySelectorAll('.toggle-pw').forEach(btn => {
    btn.addEventListener('click', () => {
      const inp = document.getElementById(btn.dataset.target);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    });
  });

  // ── Login ──
  document.getElementById('btnLogin').addEventListener('click', async () => {
    const btn = document.getElementById('btnLogin');
    const errorEl = document.getElementById('loginError');
    clearMsg(errorEl);

    const email = document.getElementById('loginEmail').value.trim();
    const pw = document.getElementById('loginPw').value;

    if (!email || !pw) { showError(errorEl, 'Bitte E-Mail und Passwort eingeben.'); return; }

    setLoading(btn, true);
    let result;
    try {
      result = await _sb.auth.signInWithPassword({ email, password: pw });
    } catch (e) {
      result = { error: e };
    }
    setLoading(btn, false);

    if (result.error) {
      showError(errorEl, translateAuthError(result.error, 'login'));
    } else {
      window.location.replace('index.html');
    }
  });

  document.getElementById('loginPw').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
  });

  // ── Registrierung ──
  document.getElementById('btnRegister').addEventListener('click', async () => {
    const btn = document.getElementById('btnRegister');
    const errorEl = document.getElementById('registerError');
    const successEl = document.getElementById('registerSuccess');
    clearMsg(errorEl); clearMsg(successEl);

    const email = document.getElementById('regEmail').value.trim();
    const pw = document.getElementById('regPw').value;
    const pw2 = document.getElementById('regPw2').value;

    if (!email || !pw || !pw2) { showError(errorEl, 'Bitte alle Felder ausfüllen.'); return; }
    if (pw.length < 8) { showError(errorEl, 'Passwort muss mindestens 8 Zeichen lang sein.'); return; }
    if (pw !== pw2) { showError(errorEl, 'Passwörter stimmen nicht überein.'); return; }

    setLoading(btn, true);
    let regResult;
    try {
      regResult = await _sb.auth.signUp({ email, password: pw });
    } catch (e) {
      regResult = { error: e };
    }
    setLoading(btn, false);

    if (regResult.error) {
      showError(errorEl, translateAuthError(regResult.error, 'signup'));
    } else {
      showSuccess(successEl, 'Konto erstellt! Bitte bestätige deine E-Mail-Adresse und melde dich danach an.');
      document.getElementById('regEmail').value = '';
      document.getElementById('regPw').value = '';
      document.getElementById('regPw2').value = '';
    }
  });

  // ── Passwort zurücksetzen ──
  document.getElementById('btnForgot').addEventListener('click', () => {
    panels.forEach(p => p.classList.remove('active'));
    tabs.forEach(t => t.classList.remove('active'));
    document.getElementById('authTabs').style.display = 'none';
    resetPanel.classList.add('active');
  });

  document.getElementById('btnResetBack').addEventListener('click', () => {
    resetPanel.classList.remove('active');
    document.getElementById('authTabs').style.display = '';
    tabs[0].classList.add('active');
    document.getElementById('loginPanel').classList.add('active');
    clearMsg(document.getElementById('resetError'));
    clearMsg(document.getElementById('resetSuccess'));
  });

  document.getElementById('btnReset').addEventListener('click', async () => {
    const btn = document.getElementById('btnReset');
    const errorEl = document.getElementById('resetError');
    const successEl = document.getElementById('resetSuccess');
    clearMsg(errorEl); clearMsg(successEl);

    const email = document.getElementById('resetEmail').value.trim();
    if (!email) { showError(errorEl, 'Bitte E-Mail-Adresse eingeben.'); return; }

    setLoading(btn, true);
    let resetResult;
    try {
      resetResult = await _sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + (window.location.pathname.replace('login.html', '')) + 'login.html'
      });
    } catch (e) {
      resetResult = { error: e };
    }
    setLoading(btn, false);

    if (resetResult.error) {
      showError(errorEl, translateAuthError(resetResult.error, 'reset'));
    } else {
      showSuccess(successEl, 'Link zum Zurücksetzen wurde gesendet. Bitte prüfe dein E-Mail-Postfach.');
    }
  });
  </script>
</body>
</html>
